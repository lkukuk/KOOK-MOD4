<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8" /> <!-- Set character encoding -->
 <meta name="viewport" content="width=device-width, initial-scale=1.0" /> <!-- Responsive viewport -->
 <title>{% block title %}KOOK Private{% endblock %}</title> <!-- Page title, can be overridden in child templates -->

 <style>
   :root {
 
    --dark-gray: #363837;
    --mid-gray: #545454;
    --mid-gray2: #A6A6A6;
    --light-gray: #D9D9D9;
    --white: #ffffff;
    --black: #000000;
    --red: #FF1010;
   }

   @font-face {
 font-family: 'Panchang';
 src: url("/static/fonts/Panchang-Bold.ttf") format("truetype");
 font-weight: bold;
 font-style: normal;
}

   html, body {
     margin: 0; /* Remove default margin */
     padding: 0; /* Remove default padding */
     background-color: var( --mid-gray); /* Light blue page background */
     border-bottom: var(--black); /* Default text color */
     font-family: sans-serif; /* Elegant serif font */
     font-size: 16px; /* Base font size */
      border-color: var(--dark-gray);
      padding-bottom: 80px;
     line-height: 1.6; /* Readable line spacing */
   }

   .top-bar {
     display: flex; /* Flex layout for top bar */
     justify-content: space-between; /* Space between left and right items */
     padding: 20px 40px; /* Padding inside top bar */
     font-family: sans-serif; /* Monospace font for top bar */
     background-color: var(--light-gray);
     font-size: 0.7rem; /* Slightly smaller text */
   }

   .bottom-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 40px;
  background: rgba(241, 239, 233, 0.65);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  font-family: sans-serif;
  font-size: 0.65rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--dark-gray);
  border-top: 1px solid rgba(0, 0, 0, 0.08);
  z-index: 999;
}

   
   .main-content {
     padding: 60px 40px; /* Space inside main content */
     max-width: 900px; /* Maximum width for content */
     margin: 0 auto; /* Center content horizontally */
     text-align: center; /* Center-align text inside */
     background: var(--light-gray); /* White background for main content */
     border: 6px solid; 
     border-radius: var(--dark-gray); /* dark-beige border around content */
   }

   h1 {
     font-size: 2rem; /* WAS 3REM Large heading size */
     font-weight: 50; /* was 400Normal font weight */
     letter-spacing: 0.05rem; /* Slight spacing between letters */
     margin-bottom: 40px; /* Space below heading */
   }

   form {
     text-align: left; /* Left-align form fields */
     max-width: 700px; /* Limit form width */
     margin: 0 auto; /* Center form horizontally */
   }

   label, p strong {
     display: block; /* Each label or strong text on its own line */
     margin-top: 25px; /* Space above element */
     font-size: 1.1rem; /* Slightly larger text */
   }

   input[type="text"],
   input[type="number"],
   input[type="radio"] {
     margin-top: 10px; /* Space above inputs */
   }

   input[type="radio"] {
     margin-right: 8px; /* Space between radio and label */
   }

   .form-group {
     margin-bottom: 20px; /* Space below each form group */
   }

   .submit-btn {
     margin-top: 30px; /* Space above submit button */
     padding: 12px 30px; /* Space inside button */
     background-color: var(--white); /* Light blue background */
     color: var(--dark-gray); /* Dark blue text */
     border: 4px solid var(--dark-gray); /* dark-beige border */
     border-radius: 40px; /* Fully rounded button */
     font-family: 'Panchang';
     font-size: 1rem; /* Standard font size */
     cursor: pointer; /* Pointer cursor on hover */
     transition: background-color 0.3s ease; /* Smooth hover transition */
   }
.button-row {
     margin-top: 80px;
     display: flex;
     justify-content: center;
     gap: 40px;
     flex-wrap: wrap;
   }


   .nav-button {
     text-decoration: none;
     background-color: var(--light-gray);
     color: var(--dark-gray);
     padding: 14px 28px;
     border: none;
     font-size: 0.85rem;
     letter-spacing: 0.15em;
     border-radius: 25px;
     transition: background-color 0.3s ease;
   }


   .nav-button:hover {
     background-color: var(--red);
   }
   .submit-btn:hover {
     background-color: car(--red); /* Slightly darker blue on hover */
   }

   .back-link {
     display: inline-block; /* Inline-block for spacing */
     margin-top: 20px; /* Space above link */
     background-color: var(--dark-gray); /* Dark blue background */
     color: white; /* White text */
     padding: 10px 24px; /* Space inside link */
     font-family: san-serif; /* Monospace font */
     text-decoration: none; /* Remove underline */
   }

   .back-link:hover {
     background-color: var(--red); /* Darker blue on hover */
   }

   @media (max-width: 400px) { /* WAS 768ox Mobile responsiveness */
     h1 {
       font-size: 2.2rem; /* Smaller heading on mobile */
     }

     .main-content {
       padding: 40px 20px; /* Smaller padding on mobile */
       margin: 20px; /* Add margin around content */
     }

     .result-box {
       background-color: rgba(255, 255, 255, 0.1); /* Transparent white box */
       padding: 30px; /* Space inside result box */
       border-radius: 16px; /* Rounded corners */
       color: #cce6f4; /* Light blue text */
       margin: 30px 0; /* Vertical spacing */
     }

     .back-link {
       display: inline-block; /* Inline-block for spacing */
       margin-top: 20px; /* Space above link */
       background-color: #000000; /* dark-beige background */
       color: white; /* White text */
       text-decoration: none; /* Remove underline */
       padding: 10px 24px; /* Space inside link */
       font-family: monospace; /* Monospace font */
     }
     /* Top Header Bar */
.top-bar {
    display: flex; /* Flex layout for left/right content */
    justify-content: space-between; /* Space between left and right text */
    align-items: center; /* Vertically center text */
    padding: 15px 40px; /* Space inside header */
    font-family: sans-serif; /* Monospace text */
    font-size: 0.9rem; /* Slightly smaller font */
    background-color: var(--dark-gray); /* Dark dark-beige background */
    color: var(--white); /* White text */
    box-shadow: 0 4px 8px rgba(0,0,0,0.15); /* Subtle shadow */
    border-bottom: 4px solid #2563eb; /* KOOK accent line */
    position: sticky; /* Stays at top when scrolling */
    top: 0; /* Stick to top */
    z-index: 1000; /* Ensure it sits above other content */
}
   }
 </style>
</head>
<body>
 <div class="top-bar">
   <div>CREATED BY LIDIYA KUKUK</div> <!-- Left side text -->
   <div>developmental - 127.0.0.1:5000</div> <!-- Right side text -->
 </div>

 <div class="main-content">
   {% block content %}{% endblock %} <!-- Placeholder for page-specific content -->
 </div>
</body>
</html>
